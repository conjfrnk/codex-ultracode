name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  fast-core:
    name: core / ${{ matrix.os }} / py${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install pinned development checks
        run: python -m pip install ruff==0.15.21 mypy==2.3.0 coverage==7.15.0 jsonschema==4.26.0
      - name: Run fast canonical gate
        run: python tools/verify.py --quick --skip-artifacts

  shards:
    name: shard / ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        shard:
          - installer-package
          - extras-runtime
          - background-routine
          - team
          - benchmark
          - ui-server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install and smoke-test the Linux verifier sandbox
        if: ${{ matrix.shard == 'benchmark' }}
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          bwrap \
            --die-with-parent \
            --unshare-net \
            --ro-bind / / \
            --tmpfs /tmp \
            --tmpfs /home \
            --tmpfs /root \
            --proc /proc \
            --dev /dev \
            -- /bin/true
      - name: Validate ownership and run shard warning-strict
        run: python -W error tools/run_test_shard.py ${{ matrix.shard }}

  full-suite:
    name: full / ${{ matrix.os }} / py${{ matrix.python }}
    needs: [fast-core, shards]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
          - os: macos-latest
            python: "3.14"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install and smoke-test the Linux verifier sandbox
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          bwrap \
            --die-with-parent \
            --unshare-net \
            --ro-bind / / \
            --tmpfs /tmp \
            --tmpfs /home \
            --tmpfs /root \
            --proc /proc \
            --dev /dev \
            -- /bin/true
      - name: Install pinned development checks
        run: python -m pip install ruff==0.15.21 mypy==2.3.0 coverage==7.15.0 jsonschema==4.26.0
      - name: Run full canonical gate without release comparison
        run: python tools/verify.py --skip-artifacts

  release-artifacts:
    name: tracked release artifacts / CPython 3.14.6
    needs: full-suite
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14.6"
      - name: Install pinned development checks
        run: python -m pip install ruff==0.15.21 mypy==2.3.0 coverage==7.15.0 jsonschema==4.26.0
      - name: Rebuild, reproduce, and compare tracked release artifacts
        run: python tools/verify.py --quick
